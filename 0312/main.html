<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>麻雀点数Pro</title>
    <style>
        :root {
            --win: #00b894;
            --lose: #d63031;
            --bg: #0f172a;
            --riichi: #fdcb6e;
            --white: white;
            --player-w: 45vmin;
            --player-h: 22vmin;
            /* ボタンのサイズを全画面で統一 */
        }

        body {
            margin: 0;
            background: var(--bg);
            font-family: sans-serif;
            overflow: hidden;
            height: 100dvh;
            color: var(--white);
        }

        /* レイアウトの基盤 */
        .table {
            position: relative;
            width: 100vw;
            height: 100dvh;
        }

        /* プレイヤーカードの共通スタイル */
        .player {
            position: absolute;
            width: var(--player-w);
            height: var(--player-h);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 3px solid #334155;
            border-radius: 15px;
            /*transition: .5vmin;*/
            background: rgba(255, 255, 255, 0.05);
        }

        .score {
            font-size: 11vmin;
            font-weight: bold;
            font-variant-numeric: tabular-nums;
            transform: translateY(3vmin);
        }

        /* 浮かび上がる変動値（+8000など）のスタイル */
        .score-diff {
            position: absolute;
            top: -2vmin;
            /* スコアより少し上からスタート */
            font-size: 6vmin;
            font-weight: bold;
            pointer-events: none;
            /* タップの邪魔にならないようにする */
            z-index: 20;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
            /* 背景と同化しないように影をつける */
        }

        /* リーチボタン（各カード内） */
        .r-btn {
            position: absolute;
            top: 0vmin;
            right: 0vmin;
            width: 45vmin;
            height: 8vmin;
            border-radius: 2vmin;
            border: .3vmin solid white;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 3vmin;
            font-weight: bold;
        }

        .wind-show {
            position: absolute;
            top: 0vmin;
            left: 0vmin;
            width: 8vmin;
            height: 8vmin;
            border-radius: 2vmin;
            border: .3vmin solid white;
            background: rgba(0, 0, 100, .5);
            color: rgba(255, 255, 255, 1);
            font-size: 4vmin;
            font-weight: bold;
        }

        .wind-show[data-wind="東"] {
            background: rgba(200, 0, 0, .5);
            color: rgba(255, 255, 255, 1);
        }

        /* 風マークが裏返るアニメーション */
        @keyframes coin-flip {
            0% {
                transform: perspective(400px) rotateY(0deg);
            }

            50% {
                transform: perspective(400px) rotateY(90deg);
            }

            50.01% {
                transform: perspective(400px) rotateY(-90deg);
            }

            100% {
                transform: perspective(400px) rotateY(0deg);
            }
        }

        .riichi-tag {
            position: absolute;
            top: -7vmin;
            right: center;
            background: white;
            color: red;
            padding: 0.5vmin 15vmin;
            border-radius: 0.7vmin;
            font-size: 1.8vmin;
            font-weight: bold;
            display: none;
        }

        .riichi-active .riichi-tag {
            display: block;
        }

        /* 1. プレイヤーの共通設定（全員まずは画面中央に置く） */
        .player-base {
            --angle: 0deg;
            --dist: 0vmin;
            position: absolute;
            display: flex;
            flex-direction: column;
            top: 50%;
            left: 50%;
            align-items: center;
            border: 3px solid #334155;
            border-radius: 2vmin;
            transition: 0.2s;
            background: rgba(255, 255, 255, 0.05);
            justify-content: center;
            width: var(--player-w);
            height: var(--player-h);
            transform:
                translate(-50%, -50%) rotate(var(--angle)) translateY(var(--dist));
        }

        /* 選択モード中はリーチボタンを反応させない */
        .selecting-active .r-btn,
        .selecting-active .riichi-tag {
            pointer-events: none;
            opacity: 0.3;
        }

        /* 選択モード中はリーチボタンを反応させない */
        .selecting-active .r-btn,
        .selecting-active .riichi-tag {
            pointer-events: none;
            opacity: 0.3;
        }

        /* 2. 各ポジションの設定（角度を変えるだけ！） */

        /* 手前（自分） */
        .pos-0 {
            --angle: 0deg;
            --dist: 35vmin;
        }

        /* 右の人（元のコードの pos-1 に相当） */
        .pos-1 {
            --angle: -90deg;
            --dist: 35vmin;
        }

        /* 対面（正面の人） */
        .pos-2 {
            --angle: 180deg;
            --dist: 35vmin;
        }

        /* 左の人 */
        .pos-3 {
            --angle: 90deg;
            --dist: 35vmin;
        }

        .selected-win {
            border-color: var(--win) !important;
            background: rgba(0, 184, 148, 0.2);
        }

        .selected-lose {
            border-color: var(--lose) !important;
            background: rgba(214, 48, 49, 0.2);
        }

        /* 中央の管理エリア */
        .center-controls {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1vmin;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        @media (max-aspect-ratio: 10/17) {
            body.is-sanma .center-controls {
                left: 35%;
                /* 中央(50%)から左側の空き地へずらす */
                transform: translate(-50%, -50%) scale(1.25);
                /* 全体を1.4倍に拡大！ */
            }

            /* もし左にずらしたことでサイコロボタンと被るのが心配なら、必要に応じてさらに上に少し逃がすことも可能です
            transform: translate(-50%, -55%) scale(1.4); */

            /* プレイヤーカード全体を少し右にずらし、サイズを拡大する */
            body.is-sanma .player-base {
                left: 58%;
                /* 基準点を中央(50%)から少し右へシフト */
                /* scale(1.15)を追加してカード全体（点数・文字・ボタンも）を1.15倍に！ */
                transform: translate(-100%, -50%) rotate(var(--angle)) translateY(var(--dist)) scale(1.25);
            }

            /* 縦のスペースは余っているので、上下のプレイヤー（自分と対面）を少し外側に逃がして広く使う */
            body.is-sanma .pos-0,
            body.is-sanma .pos-2 {
                --dist: 45vmin;
                /* デフォルトの35vminから広げる */
            }

            /* 右のプレイヤーは、右にずらした分、画面端にぶつからないように内側に引き寄せる */
            body.is-sanma .pos-1 {
                --dist: 45vmin;
                /* デフォルトの35vminから狭める */
            }
        }

        .kyoku-box {
            font-size: 4vmin;
            font-weight: bold;
            color: #94a3b8;
        }

        .honba-box {
            font-size: 4vmin;
            font-weight: bold;
            color: #94a3b8;
        }

        .kyotaku-box {
            font-size: 3vmin;
            color: white;
        }

        .tsumo-btn {
            width: 12vmin;
            height: 12vmin;
            border-radius: 50%;
            border: .3vmin solid white;
            color: white;
            background: rgba(255, 255, 255, 0.1);
            font-weight: bold;
            font-size: 4vmin;
        }

        /* 点数表オーバーレイ */
        #overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.20);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 20px;
            width: 85vw;
            max-height: 70dvh;
            color: #1e293b;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);

            --table-font: 2.8vmin;
            --btn-font: 4vmin;
        }

        /* 左右の人の時（is-side）のサイズ決定版 */
        .glass-panel.is-side {
            /* 縦持ちの時に「画面の高さ」を「パネルの横幅」として使う */
            width: 85dvh !important;
            max-height: 85vw !important;

            /* デフォルトのmax-width制限を解除 */
            max-width: none !important;
            flex-shrink: 0;
        }

        /* --- レイアウトの切り替え --- */
        .panel-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1vmin;
            overflow: hidden;
        }

        /* ---------------------------------------------------
        レイアウトの切り替え（パズル！）
        --------------------------------------------------- */

        /* パターンA: スマホ横持ち ＋ 上下の人 → 横レイアウト */
        @media (orientation: landscape) {
            .glass-panel:not(.is-side) .panel-grid {
                grid-template-columns: 3fr 1.2fr;
            }
        }

        /* パターンB: スマホ縦持ち ＋ 左右の人 → 横レイアウト */
        @media (orientation: portrait) {
            .glass-panel.is-side .panel-grid {
                grid-template-columns: 3fr 1.2fr !important;
            }
        }

        /* ---------------------------------------------------
        パネル自体のサイズ調整
        --------------------------------------------------- */

        .scroll-area {
            overflow-y: scroll;
            border-radius: 12px;
            background: transparent;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
            background: white;
        }

        th {
            background: #475569;
            color: white;
            padding: 1vmin;
            position: sticky;
            top: 0;
            font-size: var(--table-font);
        }

        td {
            padding: 4vmin 0vmin;
            border: 1px solid #676c72;
            font-weight: bold;
            font-size: 2vmin;
            font-size: var(--table-font);
        }

        .mangan-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1vmin;
        }

        .mangan-grid button {
            padding: 1vmin 2vmin;
            border-radius: 1vmin;
            border: none;
            background: #1e293b;
            color: var(--white);
            font-weight: bold;
            font-size: var(--btn-font);
        }

        /* サイコロボタン本体 */
        #dice-btn {
            position: absolute;
            bottom: 5vmin;
            left: 5vmin;
            z-index: 10;
            width: 20vmin;
            height: 20vmin;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            padding-top: 3vmin;
            cursor: pointer;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            /* iOS対応 */
            -webkit-tap-highlight-color: transparent;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        /* 押した時の凹むアクション */
        #dice-btn:active {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(0.95);
        }

        .dice-container {
            display: flex;
            gap: 2vmin;
            font-size: 6vmin;
            line-height: .5;
        }

        #dice-total {
            font-size: 10vmin;
            font-weight: bold;
            color: var(--win);
            margin-top: 0vmin;
            font-variant-numeric: tabular-nums;
        }

        /* サイコロを振っている時のアニメーション */
        .rolling .dice-container {
            animation: dice-shake 0.3s infinite linear;
        }

        @keyframes dice-shake {
            0% {
                transform: rotate(0deg) scale(1);
            }

            25% {
                transform: rotate(15deg) scale(1.2);
            }

            50% {
                transform: rotate(0deg) scale(1);
            }

            75% {
                transform: rotate(-15deg) scale(1.2);
            }

            100% {
                transform: rotate(0deg) scale(1);
            }
        }

        /* 流局ボタン */
        #ryukyoku-btn {
            position: absolute;
            bottom: 5vmin;
            right: 5vmin;
            z-index: 10;
            width: 20vmin;
            height: 20vmin;
            border-radius: 50%;
            background: rgba(255, 255, 000, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 3.5vmin;
            cursor: pointer;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            -webkit-tap-highlight-color: transparent;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        /* 押した時の凹むアクション */
        #ryukyoku-btn:active {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(0.95);
        }

        .adjust-btn {
            display: inline-block;
            padding: 20px 20px;
            margin: -20px -20px;

            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            background-color: rgba(255, 0, 0, 0.0);
        }

        /* 設定ボタンのスタイル */
        .setting-btn {
            flex: 1;
            padding: 12px 0;
            font-size: 4vmin;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #475569;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        /* 選択プロンプト（チョンボ・ツモ選択用）のオーバーレイ */
        #select-prompt {
            display: none;
            /* JavaScriptで flex に切り替えて表示します */
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 45vmin;
            height: 25vmin;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 50;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 2vmin;
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* 選択プロンプト内のテキスト */
        #select-prompt-text {
            display: block;
            width: 100%;
            position: absolute;
            top: 4vmin;
            font-size: 3.5vmin;
            font-weight: bold;
            color: var(--riichi);
            margin-bottom: 5vmin;
            text-align: center;
        }

        /* 選択プロンプト内の中止ボタン */
        #select-prompt .cancel-btn {
            position: absolute;
            bottom: 2vmin;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2.5vmin;
            background: #64748b;
        }

        /* 選択されている時のスタイル */
        .setting-btn.active {
            background: var(--win);
            border-color: var(--win);
        }
    </style>
</head>

<body>

    <div class="table">

        <div id="players-container"></div>

        <div class="center-controls">
            <div class="kyoku-box">
                <span id="roundWind-display">東</span><span id="kyoku-display">1</span>局
            </div>
            <div class="honba-box">
                <span class="adjust-btn" onclick="addHonba(-1)">-</span>
                <span id="honba-display">0</span> 本場
                <span class="adjust-btn" onclick="addHonba(+1)">+</span>
            </div>
            <div class="kyotaku-box">供託: <span id="kyotaku-display">0</span></div>

            <div id="normal-action-btns" style="display: flex; gap: 6vmin; margin-top: 0vmin;">
                <button class="tsumo-btn" onclick="tapTsumo()">ツモ</button>
                <button class="tsumo-btn" onclick="startDoubleRon()" style="font-size: 2.2vmin;">ダブロン</button>
            </div>

            <div id="dr-action-btns"
                style="display: none; flex-direction: column; gap: 1vmin; margin-top: 0vmin; align-items: center;">
                <div id="dr-prompt" style="font-size: 3.5vmin; font-weight: bold; color: var(--riichi);">1人目の和了者を選択
                </div>
                <button class="tsumo-btn" onclick="cancelDoubleRon()"
                    style="font-size: 2.5vmin; background: #64748b;">中止</button>
            </div>

        </div>
        <div id="select-prompt" onclick="if(event.target === this) cancelSelectMode()">
            <span id="select-prompt-text"></span>
            <button class="tsumo-btn cancel-btn" onclick="cancelSelectMode()">中止</button>
        </div>
    </div>

    <div id="overlay" onclick="if(event.target === this) cancel()">
        <div class="glass-panel">
            <h3 id="score-overlay-title"
                style="margin: 0; text-align: center; font-size: 4vmin; display: none; color: white;"></h3>
            <div class="panel-grid">
                <div class="scroll-area">
                    <table>
                        <thead>
                            <tr>
                                <th>符</th>
                                <th>1翻</th>
                                <th>2翻</th>
                                <th>3翻</th>
                                <th>4翻</th>
                            </tr>
                        </thead>
                        <tbody id="score-table"></tbody>
                    </table>
                </div>
                <div class="mangan-grid">
                    <button onclick="applySpecialScore(2000)">満貫</button>
                    <button onclick="applySpecialScore(3000)">跳満</button>
                    <button onclick="applySpecialScore(4000)">倍満</button>
                    <button onclick="applySpecialScore(6000)">三倍満</button>
                    <button onclick="applySpecialScore(8000)">役満</button>
                    <button onclick="applySpecialScore(16000)">二倍役満</button>
                    <button onclick="cancel()" style="background:#64748b; grid-column:span 2;">キャンセル</button>
                </div>
            </div>
        </div>
    </div>

    <button onclick="showSettings()"
        style="position:absolute; top:3vmin; right:3vmin; z-index:10; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.3); color:white; padding:4vmin 6vmin; border-radius:1vmin; font-size:8vmin;">≡
    </button>

    <div id="ryukyoku-overlay"
        style="display:none; position:fixed; inset:0; z-index:100; justify-content:center; align-items:center;"
        onclick="if(event.target === this) closeRyukyoku()">
        <div class="glass-panel" style="width: auto; padding: 30px;">
            <h3 style="margin:0; text-align:center; font-size:4vmin;">流局 (聴牌者を選択)</h3>

            <div id="tenpai-selectors"
                style="display:grid; grid-template-areas: '. top .' 'left center right' '. bottom .'; grid-template-columns: 15vmin 15vmin 15vmin; grid-template-rows: 15vmin 15vmin 15vmin; gap: 2vmin; margin-top: 20px; justify-content: center;">
            </div>
        </div>
    </div>

    <div id="settings-overlay"
        style="display:none; position:fixed; inset:0; z-index:100; justify-content:center; align-items:center;"
        onclick="if(event.target === this) closeSettings()">
        <div class="glass-panel" style="width: 60vw;">
            <div style="margin: 15px 0;">
                <label style="font-weight:bold; font-size:4vmin;">人数:</label>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <button id="btn-player-4" class="setting-btn" onclick="selectPlayerCount(4)">四麻</button>
                    <button id="btn-player-3" class="setting-btn" onclick="selectPlayerCount(3)">三麻</button>
                </div>
            </div>

            <div style="margin: 0vmin 0;">
                <label style="font-weight:bold; font-size:4vmin;">起家 (最初の親):</label>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <button id="btn-leader-0" class="setting-btn" onclick="selectLeader(0)">手前</button>
                    <button id="btn-leader-1" class="setting-btn" onclick="selectLeader(1)">右</button>
                    <button id="btn-leader-2" class="setting-btn" onclick="selectLeader(2)">対面</button>
                    <button id="btn-leader-3" class="setting-btn" onclick="selectLeader(3)">左</button>
                </div>
            </div>

            <button onclick="applySettings()"
                style="padding:12px; background:var(--lose); color:white; border:none; border-radius:10px; font-weight:bold; font-size:4vmin; margin-top:10px;">適用してリセット</button>
            <button onclick="showChomboMenu()"
                style="padding:12px; background:#50a2cb; color:white; border:none; border-radius:10px; font-weight:bold; font-size:4vmin;">チョンボの清算</button>
            <button onclick="closeSettings()"
                style="padding:12px; background:#64748b; color:white; border:none; border-radius:10px; font-weight:bold; font-size:4vmin; margin-top:0px;">閉じる</button>
        </div>
    </div>

    <button onclick="showHistory()"
        style="position:absolute; top:3vmin; left:3vmin; z-index:10; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.3); color:white; padding:4vmin 4vmin; border-radius:1vmin; font-size:6vmin;">履歴
    </button>

    <div id="history-overlay"
        style="display:none; position:fixed; inset:0; z-index:100; justify-content:center; align-items:center;"
        onclick="if(event.target === this) closeHistory()">
        <div class="glass-panel" style="width: 85vmin; height: 85vmin;">

            <div style="display:flex; border-bottom: 2px solid #475569; margin-bottom: 10px;">
                <div id="tab-current" onclick="switchTab('current')"
                    style="flex:1; text-align:center; padding:10px; font-size:4vmin; font-weight:bold; color:var(--win); border-bottom: 3px solid var(--win); cursor:pointer;">
                    現在の対局</div>
                <div id="tab-past" onclick="switchTab('past')"
                    style="flex:1; text-align:center; padding:10px; font-size:4vmin; font-weight:bold; color:white; border-bottom: none; cursor:pointer;">
                    過去の記録</div>
            </div>

            <div id="history-list" class="scroll-area" style="max-height: 55vh; padding: 10px;"></div>

            <div id="past-list" class="scroll-area" style="display:none; max-height: 55vh; padding: 10px;"></div>

            <button onclick="closeHistory()"
                style="padding:15px; background:#64748b; color:white; border:none; border-radius:10px; font-weight:bold; font-size:4vmin; margin-top: auto; width: 100%;">閉じる</button>
        </div>
    </div>

    <div id="delete-modal-overlay"
        style="display:none; position:fixed; inset:0; z-index:110; justify-content:center; align-items:center;"
        onclick="if(event.target === this) closeDeleteModal()">
        <div class="glass-panel" style="width: 70vmin;">
            <h3 style="margin:0; text-align:center; font-size: 4.5vmin;">過去の記録を整理</h3>
            <div style="display:flex; flex-direction:column; gap:15px; margin-top:20px;">
                <button onclick="deletePastGames('all')" class="setting-btn"
                    style="background:var(--lose); border-color:var(--lose); color:white;">すべて消去</button>
                <button onclick="deletePastGames(10)" class="setting-btn">最新 10件 を残して消去</button>
                <button onclick="deletePastGames(30)" class="setting-btn">最新 30件 を残して消去</button>
                <button onclick="closeDeleteModal()" class="setting-btn"
                    style="background:#64748b; border-color:#64748b; color:white; margin-top:10px;">キャンセル</button>
            </div>
        </div>
    </div>

    <button id="dice-btn" onclick="rollDice()">
        <div class="dice-container">
            <span id="dice1">&#x2684;</span> <span id="dice2">&#x2682;</span>
        </div>
        <div id="dice-total">8</div>
    </button>

    <button id="ryukyoku-btn" onclick="showRyukyoku()">流局</button>

    <script>
        let playerCount = 3;
        const startScore = (playerCount === 3) ? 35000 : 25000;
        let scores = [startScore, startScore, startScore, startScore];
        let riichiStatus = [false, false, false, false];
        let honba = 0;
        let kyotaku = 0;
        let winIdx = null, loseIdx = null;
        const winds = ['東', '南', '西', '北'];
        let idxRoundWind = 0;
        let roundWind = winds[idxRoundWind];
        let kyoku = 1;
        let firstLeader = 0;
        let isOya = null;
        // --- ダブロン用の状態管理 ---
        let doubleRonState = 0; // 0:オフ, 1:和了1人目選択, 2:和了2人目選択, 3:放銃者選択, 4:点数1入力中, 5:点数2入力中
        let drWin1 = null, drWin2 = null, drLose = null;
        let drScore1 = 0, drScore2 = 0;
        let selectMode = null; // null, 'chombo', 'tsumo'

        // HTMLを流し込む先の要素を取得
        const container = document.getElementById("players-container");
        let htmlContent = "";
        let gameHistory = [];

        // ★ まず真っ先にローカルストレージを確認する！
        const savedData = localStorage.getItem('mahjong_current_game');

        if (savedData) {
            // セーブデータがあれば、変数をすべて復元する
            const data = JSON.parse(savedData);
            playerCount = data.playerCount;
            scores = data.scores;
            riichiStatus = data.riichiStatus;
            honba = data.honba;
            kyotaku = data.kyotaku;
            idxRoundWind = data.idxRoundWind;
            roundWind = data.roundWind;
            kyoku = data.kyoku;
            firstLeader = data.firstLeader;
            gameHistory = data.gameHistory;

            // 復元したデータで画面を描画
            initBoard();
            renderScoreTable();
            updateView();
        } else {
            // セーブデータがない（初回アクセスやリセット後）場合は初期設定で描画してセーブ
            initBoard();
            renderScoreTable();
            updateView();
            recordState();
        }

        // プレイヤーのHTMLを生成する処理を関数化！
        function initBoard() {
            // 三麻のときはbodyに'is-sanma'クラスを付ける（CSSのトリガーになります）
            if (playerCount === 3) document.body.classList.add('is-sanma');
            else document.body.classList.remove('is-sanma');
            htmlContent = "";
            for (let i = 0; i < playerCount; i++) {
                let playerWind = winds[(i - firstLeader - kyoku + 1 + 5 * playerCount) % playerCount];
                htmlContent += `
                    <div class="player-base pos-${i}" id="p${i}" onclick="tapPlayer(${i})">
                        <div class="score" id="s${i}">${scores[i]}</div>
                        <div class="riichi-tag" onclick="event.stopPropagation(); riichi(${i})">●</div>
                        <button class="wind-show" data-wind="${playerWind}">${playerWind}</button>
                        <button class="r-btn" onclick="event.stopPropagation(); riichi(${i})">R</button>
                    </div>
                `;
            }
            container.innerHTML = htmlContent;
            updateView();
        }

        // プレイヤーインデックスから現在の「風のインデックス(0=東, 1=南...)」を取得する
        function getWindIndex(idx) {
            return (idx - firstLeader - kyoku + 1 + 5 * playerCount) % playerCount;
        }

        // 該当プレイヤーが親かどうか判定する
        function checkIsOya(idx) {
            return getWindIndex(idx) === 0; // 東家なら親
        }

        // 今の局の開始状態を記録する関数

        function recordState() {
            gameHistory.push({
                scores: [...scores], // 配列の中身をコピーして保存
                riichiStatus: [false, false, false, false], // 局開始時はリーチなし
                honba: honba,
                kyotaku: kyotaku,
                kyoku: kyoku,
                idxRoundWind: idxRoundWind,
                roundWind: roundWind,
                firstLeader: firstLeader
            });
            saveCurrentGame();
        }

        // 履歴画面を表示する関数
        function showHistory() {
            const listDiv = document.getElementById('history-list');
            let html = '';

            // 最新の履歴が上に来るように逆順でループ
            for (let i = gameHistory.length - 1; i >= 0; i--) {
                const h = gameHistory[i];
                const title = `${h.roundWind}${h.kyoku}局 ${h.honba}本場`;
                // スコアを並べてテキスト化（三麻なら3人分、四麻なら4人分）
                const scoreText = h.scores.slice(0, playerCount).map((score, idx) => {
                    // もしそのインデックスが起家なら [起] を付ける
                    if (idx === h.firstLeader) {
                        return `<span>${score}[起]</span>`;
                    }
                    return score;
                }).join(' / ');

                html += `
        <div onclick="restoreState(${i})" style="background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; padding: 12px; margin-bottom: 10px; color: white; cursor: pointer;">
            <div style="font-size: 3.5vmin; font-weight: bold; margin-bottom: 5px; color: var(--riichi);">${title} <span style="font-size: 2.5vmin; color: #94a3b8;">[呼出]</span></div>
            <div style="font-size: 3.5vmin; font-variant-numeric: tabular-nums;">${scoreText}</div>
        </div>
        `;
            }

            listDiv.innerHTML = html;
            document.getElementById('history-overlay').style.display = 'flex';
        }

        function closeHistory() {
            document.getElementById('history-overlay').style.display = 'none';
        }

        // ==========================
        // LocalStorage & 履歴タブ ロジック
        // ==========================

        // 毎局終了時に「現在の状態」をまるごと保存する（リロード対策）
        function saveCurrentGame() {
            const data = {
                playerCount, scores, riichiStatus, honba, kyotaku,
                idxRoundWind, roundWind, kyoku, firstLeader, gameHistory
            };
            localStorage.setItem('mahjong_current_game', JSON.stringify(data));
        }

        // ページ読み込み時に「現在の状態」を復元する
        function loadCurrentGame() {
            const savedData = localStorage.getItem('mahjong_current_game');
            if (savedData) {
                const data = JSON.parse(savedData);
                playerCount = data.playerCount;
                scores = data.scores;
                riichiStatus = data.riichiStatus;
                honba = data.honba;
                kyotaku = data.kyotaku;
                idxRoundWind = data.idxRoundWind;
                roundWind = data.roundWind;
                kyoku = data.kyoku;
                firstLeader = data.firstLeader;
                gameHistory = data.gameHistory;
                initBoard();
                updateView();
            }
        }

        // ゲームリセット時に、今の対局を「過去の記録」としてアーカイブする
        function archiveToPastGames() {
            // 1局もプレイしていなければ保存しない
            if (gameHistory.length <= 1) return;

            let pastGames = JSON.parse(localStorage.getItem('mahjong_past_games')) || [];

            // 最終時点のスコアを取得
            const finalState = gameHistory[gameHistory.length - 1];

            pastGames.unshift({
                date: new Date().toLocaleString('ja-JP', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }),
                playerCount: playerCount,
                finalScores: [...finalState.scores]
            });

            // 最新30件だけ残す（容量節約）
            if (pastGames.length > 30) pastGames.pop();

            localStorage.setItem('mahjong_past_games', JSON.stringify(pastGames));
        }

        // タブ切り替え処理
        function switchTab(tab) {
            const tabCurrent = document.getElementById('tab-current');
            const tabPast = document.getElementById('tab-past');
            const listCurrent = document.getElementById('history-list');
            const listPast = document.getElementById('past-list');

            if (tab === 'current') {
                tabCurrent.style.color = 'var(--win)';
                tabCurrent.style.borderBottom = '3px solid var(--win)';
                tabPast.style.color = 'white';
                tabPast.style.borderBottom = 'none';
                listCurrent.style.display = 'block';
                listPast.style.display = 'none';
            } else {
                tabPast.style.color = 'var(--win)';
                tabPast.style.borderBottom = '3px solid var(--win)';
                tabCurrent.style.color = 'white';
                tabCurrent.style.borderBottom = 'none';
                listCurrent.style.display = 'none';
                listPast.style.display = 'block';
                renderPastGames(); // 過去タブを開いた時に描画
            }
        }

        // 過去の記録を描画する処理
        function renderPastGames() {
            const pastDiv = document.getElementById('past-list');
            let pastGames = JSON.parse(localStorage.getItem('mahjong_past_games')) || [];

            if (pastGames.length === 0) {
                pastDiv.innerHTML = '<div style="text-align:center; color:#94a3b8; margin-top:20px;">過去の記録はありません</div>';
                return;
            }

            // 記録がある場合のみ、リストの先頭に整理ボタンを配置
            let html = `
            <div style="text-align: right; margin-bottom: 10px;">
                <button onclick="showDeleteModal()" style="padding: 1vmin 4vmin; background: rgba(214, 48, 49, 0.8); color: white; border: 1px solid rgba(255,255,255,0.3); border-radius: 1vmin; font-weight: bold; font-size: 2vmin; cursor: pointer;">記録を整理</button>
            </div>
            `;

            pastGames.forEach((game) => {
                const title = `${game.date} (${game.playerCount}麻)`;
                const scoreText = game.finalScores.slice(0, game.playerCount).join(' / ');

                html += `
                <div style="background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; padding: 12px; margin-bottom: 10px; color: white;">
                    <div style="font-size: 3.5vmin; font-weight: bold; margin-bottom: 5px; color: #94a3b8;">${title}</div>
                    <div style="font-size: 4vmin; font-variant-numeric: tabular-nums;">${scoreText}</div>
                </div>
                `;
            });
            pastDiv.innerHTML = html;
        }

        // ★ ページ読み込み完了と同時に過去のデータを復元するよう仕込む
        window.addEventListener('load', loadCurrentGame);

        // 選択した局の状態に巻き戻す関数
        function restoreState(index) {
            if (!confirm('この局の開始時点まで巻き戻しますか？')) return;

            const h = gameHistory[index];
            scores = [...h.scores];
            riichiStatus = [...h.riichiStatus];
            honba = h.honba;
            kyotaku = h.kyotaku;
            kyoku = h.kyoku;
            idxRoundWind = h.idxRoundWind;
            roundWind = h.roundWind;
            firstLeader = h.firstLeader;

            // 巻き戻した未来の履歴は消去する
            gameHistory = gameHistory.slice(0, index + 1);

            closeHistory();
            cancel(); // 選択状態をリセット
            updateView();
            saveCurrentGame();
        }
        // --- 履歴機能ここまで ---

        // ==========================
        // 流局ロジック
        // ==========================
        let tenpaiStatus = [false, false, false, false];

        function showRyukyoku() {
            tenpaiStatus = [false, false, false, false];
            renderTenpaiSelectors();
            document.getElementById('ryukyoku-overlay').style.display = 'flex';
        }

        function toggleTenpai(i) {
            tenpaiStatus[i] = !tenpaiStatus[i];
            renderTenpaiSelectors();
        }

        function renderTenpaiSelectors() {
            let html = '';

            // 0:手前(bottom), 1:右(right), 2:対面(top), 3:左(left) に対応させる
            const gridAreas = ['bottom', 'right', 'top', 'left'];

            for (let i = 0; i < playerCount; i++) {
                // 三麻で左(left)の時はボタンを作らない
                let currentWind = winds[(i - firstLeader - kyoku + 1 + 5 * playerCount) % playerCount];
                let bg = tenpaiStatus[i] ? 'var(--win)' : 'rgba(255,255,255,0.1)';
                let border = tenpaiStatus[i] ? 'none' : '2px solid #475569';

                html += `<button onclick="toggleTenpai(${i})" style="grid-area: ${gridAreas[i]}; width: 100%; height: 100%; background:${bg}; border:${border}; color:white; border-radius:2vmin; font-weight:bold; font-size:5vmin; transition:0.2s;">${currentWind}</button>`;
            }

            html += `<button onclick="applyRyukyoku()" style="grid-area: center; width: 100%; height: 100%; background: var(--win); color: white; border: 3px solid rgba(255,255,255,0.5); border-radius: 50%; font-weight: bold; font-size: 4vmin; box-shadow: 0 4px 10px rgba(0,0,0,0.5); cursor: pointer;">確定</button>`;

            document.getElementById('tenpai-selectors').innerHTML = html;
        }

        function applyRyukyoku() {
            let tenpaiCount = tenpaiStatus.filter((t, i) => i < playerCount && t).length;
            // 全員テンパイ or 全員ノーテンじゃない場合のみ点数移動
            if (tenpaiCount > 0 && tenpaiCount < playerCount) {
                let totalBappu = (playerCount === 4) ? 3000 : 2000;
                let receive = totalBappu / tenpaiCount;
                let pay = totalBappu / (playerCount - tenpaiCount);

                for (let i = 0; i < playerCount; i++) {
                    if (tenpaiStatus[i]) {
                        scores[i] += receive;
                    } else {
                        scores[i] -= pay;
                    }
                }
            }
            // 親がテンパイしているか判定
            let currentOyaIdx = (firstLeader + kyoku - 1) % playerCount;
            let oyaTenpai = tenpaiStatus[currentOyaIdx];

            if (!oyaTenpai) {
                kyoku++; // 親ノーテンなら局が進む
                if (kyoku === playerCount + 1) {
                    idxRoundWind++;
                    idxRoundWind = idxRoundWind % 4;
                    roundWind = winds[idxRoundWind];
                    kyoku -= playerCount;
                }
            }
            addHonba(1); // 流局は必ず本場が1増える
            riichiStatus = [false, false, false, false]; // リーチは解除 (供託はそのまま)
            closeRyukyoku();
            cancel();
            updateView();
            recordState();
        }

        function closeRyukyoku() {
            document.getElementById('ryukyoku-overlay').style.display = 'none';
        }

        // ==========================
        // 設定（リセット）ロジック
        // ==========================
        let tempPlayerCount = playerCount;
        let tempLeader = firstLeader;

        function showSettings() {
            // 現在のゲーム設定を一時変数にコピー
            tempPlayerCount = playerCount;
            tempLeader = firstLeader;
            updateSettingsUI(); // ボタンの見た目を更新
            document.getElementById('settings-overlay').style.display = 'flex';
        }

        function closeSettings() {
            document.getElementById('settings-overlay').style.display = 'none';
        }

        // 人数ボタンを押した時の処理
        function selectPlayerCount(num) {
            tempPlayerCount = num;
            // 三麻を選んだ時、もし「左」を選択中なら強制的に「対面」へずらす
            if (num === 3 && tempLeader === 3) tempLeader = 2;
            updateSettingsUI();
        }

        // 起家ボタンを押した時の処理
        function selectLeader(num) {
            tempLeader = num;
            updateSettingsUI();
        }

        // ボタンの色や状態を最新にする関数
        function updateSettingsUI() {
            // 人数ボタンの色を更新
            document.getElementById('btn-player-4').classList.toggle('active', tempPlayerCount === 4);
            document.getElementById('btn-player-3').classList.toggle('active', tempPlayerCount === 3);

            // 起家ボタンの色を更新
            for (let i = 0; i <= 3; i++) {
                document.getElementById('btn-leader-' + i).classList.toggle('active', tempLeader === i);
            }

            // 三麻のときは「左」のボタンをグレーアウトして押せなくする
            const btnLeft = document.getElementById('btn-leader-3');
            if (tempPlayerCount === 3) {
                btnLeft.style.opacity = '0.3';
                btnLeft.style.pointerEvents = 'none';
            } else {
                btnLeft.style.opacity = '1';
                btnLeft.style.pointerEvents = 'auto';
            }
        }

        function applySettings() {
            archiveToPastGames();
            // 一時変数の値を本番の変数に反映
            playerCount = tempPlayerCount;
            firstLeader = tempLeader;

            // 初期状態にリセット
            let initScore = (playerCount === 3) ? 35000 : 25000;
            scores = [initScore, initScore, initScore, initScore];
            riichiStatus = [false, false, false, false];
            honba = 0;
            kyotaku = 0;
            kyoku = 1;
            idxRoundWind = 0;
            roundWind = winds[idxRoundWind];
            winIdx = null;
            loseIdx = null;
            isOya = null;

            gameHistory = [];
            initBoard();
            renderScoreTable();
            recordState();
            closeSettings();
            cancelSelectMode()
        }

        ///////////////////////////////////////////////////////////
        // 点数表を最新の状況に合わせて描画する関数
        ///////////////////////////////////////////////////////////
        function renderScoreTable() {
            const tbody = document.getElementById('score-table');
            let tableHTML = '';

            const fuList = [20, 25, 30, 40, 50, 60, 70, 80, 90, 100, 110];

            for (let fu of fuList) {
                let row = `<tr><td>${fu}</td>`;

                for (let han = 1; han <= 4; han++) {
                    // あり得ない組み合わせを弾くロジック
                    let isTsumo = (loseIdx === "tsumo");
                    let isValid = true;

                    if (han === 1 && fu === 20) isValid = false; // 1翻20符なし
                    if (han === 1 && fu === 25) isValid = false; // 1翻25符なし
                    if (!isTsumo && fu === 20) isValid = false;  // 20符ロンなし
                    if (isTsumo && han === 2 && fu === 25) isValid = false; // 2翻25符ツモなし

                    // あり得ないマスはグレーアウトしてクリックできないようにする
                    if (!isValid) {
                        row += `<td style="color: #475569; background: rgba(0,0,0,0.2); pointer-events: none;">-</td>`;
                        continue; // 以下の計算をスキップして次のマスへ
                    }

                    // ここから下は元の計算ロジックそのまま
                    let base = fu * Math.pow(2, han + 2);
                    let koPay = Math.min(2000, Math.ceil(base / 100) * 100);
                    let oyaPay = Math.min(4000, Math.ceil((base * 2) / 100) * 100);
                    let ronScoreKo = Math.min(8000, Math.ceil((base * 4) / 100) * 100);
                    let ronScoreOya = Math.min(12000, Math.ceil((base * 6) / 100) * 100);

                    let displayText = "";
                    let onClickEvent = "";

                    if (isTsumo) {
                        if (isOya) {
                            displayText = `${oyaPay}ALL`;
                            onClickEvent = `applyTsumo(${oyaPay}, ${oyaPay})`;
                        } else {
                            displayText = `${koPay}-${oyaPay}`;
                            onClickEvent = `applyTsumo(${oyaPay}, ${koPay})`;
                        }
                    } else {
                        if (isOya) {
                            displayText = `${ronScoreOya}`;
                            onClickEvent = `applyRon(${ronScoreOya})`;
                        } else {
                            displayText = `${ronScoreKo}`;
                            onClickEvent = `applyRon(${ronScoreKo})`;
                        }
                    }

                    row += `<td onclick="${onClickEvent}">${displayText}</td>`;
                }
                tableHTML += row + `</tr>`;
            }
            tbody.innerHTML = tableHTML;
        }

        //////////////////////////////////
        // 麻雀の諸計算
        //////////////////////////////////

        function riichi(idx) {
            const isRiichi = !riichiStatus[idx];
            riichiStatus[idx] = isRiichi;
            // 点数と供託の移動（trueなら-1000、falseなら+1000）
            scores[idx] += isRiichi ? -1000 : 1000;
            kyotaku += isRiichi ? 1000 : -1000;
            updateView();
        }

        function addHonba(val) {
            honba = Math.max(0, honba + val);
            document.getElementById('honba-display').innerText = honba;
        }

        function tapTsumo() {
            if (winIdx === null) {
                selectMode = 'tsumo'; document.body.classList.add('selecting-active');
                document.getElementById('select-prompt').style.display = 'block';
                document.getElementById('select-prompt-text').innerText = "ツモ者を選択";
                updateView();
            }
            else {
                loseIdx = 'tsumo';
                showOverlay();
                updateView();
            }
        }

        // ロンの精算
        function applyRon(amt) {
            if (doubleRonState === 4) {
                // 1人目の点数を一時保存して、2人目の入力へ切り替え
                drScore1 = amt;
                doubleRonState = 5;
                winIdx = drWin2; // オーバーレイがクルッと2人目の方を向く！
                isOya = checkIsOya(drWin2);
                showOverlay("2人目 (" + winds[getWindIndex(drWin2)] + "家) の点数");
                return;
            }
            if (doubleRonState === 5) {
                // 2人目の点数が確定したので一気に処理
                drScore2 = amt;
                processDoubleRon();
                return;
            }

            // --- 通常のロン処理（そのまま） ---
            const bonus = honba * 300;
            scores[winIdx] += (amt + bonus + kyotaku);
            scores[loseIdx] -= (amt + bonus);
            finishRound();
        }

        // ツモの精算 (三麻ツモ損・四麻両対応)
        function applyTsumo(oyaPays, koPays) {
            const honbaBonus = honba * 100; // ツモ時の本場は1人100点
            let totalGain = 0;

            scores = scores.map((s, i) => {
                if (i === winIdx || i >= playerCount) return s;

                let isPayingOya = (i === (firstLeader + kyoku - 1) % playerCount);

                let payment = (isPayingOya ? oyaPays : koPays) + honbaBonus;

                totalGain += payment; // もらえる合計を記録
                return s - payment;   // 点数を引く
            });

            // アガった人に合計点＋供託を足す
            scores[winIdx] += totalGain + kyotaku;
            finishRound();
        }

        // 共通の後処理
        function finishRound() {
            kyotaku = 0;
            if (!isOya) {
                honba = 0;
                kyoku++;
                if (kyoku === playerCount + 1) {
                    idxRoundWind++;
                    idxRoundWind = idxRoundWind % 4;
                    roundWind = winds[idxRoundWind];
                    kyoku -= playerCount;
                }
            } else addHonba(1);
            riichiStatus = [false, false, false, false];
            cancel();
            updateView();
            recordState();
        }

        // 満貫以上の特殊な点数をベース値(基本点)から計算して割り振る
        function applySpecialScore(base) {
            let koPay = Math.ceil(base / 100) * 100;
            let oyaPay = Math.ceil((base * 2) / 100) * 100;
            let ronScoreKo = Math.ceil((base * 4) / 100) * 100;
            let ronScoreOya = Math.ceil((base * 6) / 100) * 100;

            if (loseIdx === "tsumo") {
                applyTsumo(oyaPay, koPay);
            } else {
                applyRon(isOya ? ronScoreOya : ronScoreKo);
            }
        }

        // ==========================
        // チョンボ清算ロジック
        // ==========================

        // モード切替の開始
        function showChomboMenu() {
            closeSettings();
            selectMode = 'chombo';
            document.body.classList.add('selecting-active');
            // document.getElementById('normal-action-btns').style.display = 'none';
            document.getElementById('select-prompt').style.display = 'block';
            document.getElementById('select-prompt-text').innerText = "チョンボ者を選択";
            updateView();
        }

        // キャンセル処理
        function cancelSelectMode() {
            selectMode = null;
            document.body.classList.remove('selecting-active');
            document.getElementById('normal-action-btns').style.display = 'flex';
            document.getElementById('select-prompt').style.display = 'none';
            updateView();
        }

        // tapPlayer を改造
        function tapPlayer(idx) {
            if (selectMode === 'chombo') {
                applyChombo(idx);
                cancelSelectMode();
                return;
            }
            if (selectMode === 'tsumo') {
                selectMode = null;
                loseIdx = 'tsumo';
                isOya = checkIsOya(idx)
                winIdx = idx;
                showOverlay();
                cancelSelectMode();
                updateView();
                return;
            }

            if (doubleRonState > 0) {
                // ...既存のダブロン処理...
                if (doubleRonState === 1) { drWin1 = idx; document.getElementById('dr-prompt').innerText = "2人目の和了者を選択"; doubleRonState = 2; }
                else if (doubleRonState === 2) { if (idx === drWin1) return; drWin2 = idx; document.getElementById('dr-prompt').innerText = "放銃者を選択"; doubleRonState = 3; }
                else if (doubleRonState === 3) { if (idx === drWin1 || idx === drWin2) return; drLose = idx; doubleRonState = 4; winIdx = drWin1; loseIdx = drLose; isOya = checkIsOya(drWin1); showOverlay("1人目 (" + winds[getWindIndex(drWin1)] + "家) の点数"); }
                updateView();
                return;
            }

            // 3. 通常時の処理（そのまま）
            if (winIdx === null) { winIdx = idx; isOya = checkIsOya(idx); }
            else if (winIdx === idx) winIdx = null;
            else { loseIdx = idx; showOverlay(); }
            updateView();
        }

        // チョンボの実際の計算
        function applyChombo(idx) {
            const isOyaChombo = checkIsOya(idx);
            let payToOya = 4000;
            let payToKo = 2000;

            if (playerCount === 3) { payToOya = 4000; payToKo = 4000; }

            for (let i = 0; i < playerCount; i++) {
                if (i === idx) continue;
                let amt = (isOyaChombo) ? payToKo : (checkIsOya(i) ? payToOya : payToKo);
                scores[i] += amt;
                scores[idx] -= amt;
            }

            updateView();
            recordState();
        }

        //////////////////////////////////////////
        // 回転系の描画関数
        //////////////////////////////////////////
        function showOverlay(titleText = null) {
            renderScoreTable();
            const panel = document.querySelector('.glass-panel');
            const overlay = document.getElementById('overlay');

            // 追加: タイトルの制御
            const titleEl = document.getElementById('score-overlay-title');
            if (titleText) {
                titleEl.innerText = titleText;
                titleEl.style.display = 'block';
            } else {
                titleEl.style.display = 'none';
            }
            if (winIdx === 1 || winIdx === 3) {
                panel.classList.add('is-side');
            } else {
                panel.classList.remove('is-side');
            }
            const angles = [0, -90, 180, 90];
            const targetAngle = angles[winIdx];
            panel.style.transform = `rotate(${targetAngle}deg)`;
            overlay.style.display = 'flex';
        }

        function cancel() {
            winIdx = null; loseIdx = null;
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('score-overlay-title').style.display = 'none'; // タイトルも隠す

            // ダブロン処理中だったらリセット
            if (doubleRonState > 0 && doubleRonState >= 4) {
                cancelDoubleRon();
            }
            updateView();
        }

        ///////////////////////////////////////////
        // ダブロン処理
        ///////////////////////////////////////////
        // ダブロンモードの起動
        function startDoubleRon() {
            doubleRonState = 1;
            drWin1 = null; drWin2 = null; drLose = null;
            winIdx = null; loseIdx = null;
            document.getElementById('normal-action-btns').style.display = 'none';
            document.getElementById('dr-action-btns').style.display = 'flex';
            document.getElementById('dr-prompt').innerText = "1人目の和了者を選択";
            updateView();
        }

        // ダブロンモードの中止
        function cancelDoubleRon() {
            doubleRonState = 0;
            document.getElementById('normal-action-btns').style.display = 'flex';
            document.getElementById('dr-action-btns').style.display = 'none';
            winIdx = null; loseIdx = null;
            updateView();
        }

        // ダブロンの最終計算処理
        function processDoubleRon() {
            const bonus = honba * 300; // ダブロン時は両者に本場が付くのが標準

            let gain1 = drScore1 + bonus;
            let gain2 = drScore2 + bonus;
            let totalLoss = gain1 + gain2;

            // 頭ハネの計算（放銃者から見てツモ順が近い方に供託を渡す）
            let dist1 = (drWin1 - drLose + playerCount) % playerCount;
            let dist2 = (drWin2 - drLose + playerCount) % playerCount;

            if (dist1 < dist2) {
                gain1 += kyotaku; // 1人目が近い
            } else {
                gain2 += kyotaku; // 2人目が近い
            }

            // 点数の移動
            scores[drWin1] += gain1;
            scores[drWin2] += gain2;
            scores[drLose] -= totalLoss;

            // 次の局の親判定（和了者に親が含まれていれば連荘）
            let oyaWon = checkIsOya(drWin1) || checkIsOya(drWin2);
            isOya = oyaWon;

            // UIを通常に戻して局を進める
            document.getElementById('normal-action-btns').style.display = 'flex';
            document.getElementById('dr-action-btns').style.display = 'none';
            doubleRonState = 0;
            drWin1 = null; drWin2 = null; drLose = null;

            finishRound();
        }

        ///////////////////////////////////////////
        // 書き換え処理
        ///////////////////////////////////////////
        function updateView() {
            // 【追加】まず全員の点数変動を見て、一番デカい「最大変動幅」を見つける
            let maxDiff = 0;
            for (let i = 0; i < playerCount; i++) {
                const scoreElement = document.getElementById('s' + i);
                if (scoreElement) {
                    const currentScore = parseInt(scoreElement.innerText, 10) || 0;
                    const diff = Math.abs(scores[i] - currentScore);
                    if (diff > maxDiff) maxDiff = diff;
                }
            }
            // 【追加】最大変動幅に合わせて、全員共通のアニメーション時間を決める
            const sharedDuration = Math.min(Math.max(100, (maxDiff * 0.070) + 100), 1500);

            for (let i = 0; i < playerCount; i++) {
                const el = document.getElementById('p' + i);
                if (el) {
                    let isWinSelected = (i === winIdx) || (doubleRonState > 0 && (i === drWin1 || i === drWin2));
                    let isLoseSelected = (i === loseIdx) || (doubleRonState > 0 && i === drLose);
                    el.className = `player-base pos-${i} ${isWinSelected ? 'selected-win' : ''} ${isLoseSelected ? 'selected-lose' : ''} ${riichiStatus[i] ? 'riichi-active' : ''}`;
                    const windBtn = el.querySelector('.wind-show');
                    if (windBtn) {
                        let currentWind = winds[getWindIndex(i)];
                        let oldWind = windBtn.getAttribute('data-wind');

                        if (oldWind && oldWind !== currentWind) {
                            windBtn.style.animation = 'none';
                            void windBtn.offsetWidth;
                            windBtn.style.animation = 'coin-flip 0.6s ease-in-out';

                            // アニメーションがちょうど真横（50% = 300ms）になった瞬間に文字を書き換える
                            setTimeout(() => {
                                windBtn.innerText = currentWind;
                                windBtn.setAttribute('data-wind', currentWind);
                            }, 300);
                        } else {
                            // 初期化時や、風が変わっていない時（リーチしただけ等）はそのまま
                            windBtn.innerText = currentWind;
                            windBtn.setAttribute('data-wind', currentWind);
                        }
                    }
                }

                const scoreElement = document.getElementById('s' + i);
                if (scoreElement) {
                    const currentScore = parseInt(scoreElement.innerText, 10) || 0;
                    const targetScore = scores[i];

                    if (currentScore !== targetScore) {
                        animateScore(scoreElement, currentScore, targetScore, sharedDuration);
                        const diff = targetScore - currentScore;
                        showFloatingDiff(i, diff, sharedDuration);
                    }
                }
            }

            // 中央エリアの更新
            document.getElementById('kyotaku-display').innerText = kyotaku;
            document.getElementById('honba-display').innerText = honba;
            document.getElementById('roundWind-display').innerText = roundWind;
            document.getElementById('kyoku-display').innerText = kyoku;
        }

        // ==========================
        // 過去の記録の削除ロジック
        // ==========================
        function showDeleteModal() {
            document.getElementById('delete-modal-overlay').style.display = 'flex';
        }

        function closeDeleteModal() {
            document.getElementById('delete-modal-overlay').style.display = 'none';
        }

        function deletePastGames(keepCount) {
            let pastGames = JSON.parse(localStorage.getItem('mahjong_past_games')) || [];

            if (keepCount === 'all') {
                if (!confirm('本当にすべての過去の記録を消去しますか？\n（現在の対局は消えません）')) return;
                localStorage.removeItem('mahjong_past_games');
            } else {
                if (pastGames.length <= keepCount) {
                    alert(`現在の記録は ${pastGames.length}件 のため、消去する古いデータがありません。`);
                    closeDeleteModal();
                    return;
                }
                if (!confirm(`最新の ${keepCount}件 を残して、それより古い記録をすべて消去しますか？`)) return;

                // 最新のkeepCount件だけスライスして残す
                pastGames = pastGames.slice(0, keepCount);
                localStorage.setItem('mahjong_past_games', JSON.stringify(pastGames));
            }

            closeDeleteModal();
            renderPastGames(); // 画面を再描画してリストを更新
        }

        ////////////////////////////////////////////////////
        // サイコロ関数
        ////////////////////////////////////////////////////
        // Unicodeのサイコロの目 (⚀, ⚁, ⚂, ⚃, ⚄, ⚅)
        const diceFaces = ['\u2680', '\u2681', '\u2682', '\u2683', '\u2684', '\u2685'];
        let isRolling = false;

        function rollDice() {
            // 連打防止
            if (isRolling) return;
            isRolling = true;

            const btn = document.getElementById('dice-btn');
            const d1El = document.getElementById('dice1');
            const d2El = document.getElementById('dice2');
            const totalEl = document.getElementById('dice-total');

            // アニメーション開始のためのクラス付与
            btn.classList.add('rolling');
            // totalEl.innerText = '-';

            let rolls = 0;
            const maxRolls = 5; // パラパラと目が切り替わる回数

            // 60ms間隔でランダムな目を表示して躍動感を出す
            const rollInterval = setInterval(() => {
                let tempD1 = Math.floor(Math.random() * 6);
                let tempD2 = Math.floor(Math.random() * 6);
                d1El.innerText = diceFaces[tempD1];
                d2El.innerText = diceFaces[tempD2];
                totalEl.innerText = (tempD1 + 1) + (tempD2 + 1);
                rolls++;

                if (rolls >= maxRolls) {
                    clearInterval(rollInterval);
                    btn.classList.remove('rolling');

                    // 最終的な出目を決定
                    const finalD1 = Math.floor(Math.random() * 6);
                    const finalD2 = Math.floor(Math.random() * 6);
                    d1El.innerText = diceFaces[finalD1];
                    d2El.innerText = diceFaces[finalD2];

                    // 合計値を計算して表示（配列のインデックスは0からなので+1する）
                    totalEl.innerText = (finalD1 + 1) + (finalD2 + 1);

                    isRolling = false;
                }
            }, 60);
        }

        ////////////////////////////////////////////////////
        // アニメーション関数
        ////////////////////////////////////////////////////

        // 点数をパラパラ動かすアニメーション関数
        function animateScore(obj, start, end, duration) {
            let startTimestamp = null;

            // 連続でタップされたときに前のアニメーションをキャンセルする
            if (obj.animationId) cancelAnimationFrame(obj.animationId);

            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                // 進行度を0〜1で計算
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);

                // イージング（最初は早く、最後はゆっくり止まる計算式）
                const easeOut = progress === 1 ? 1 : 1 - Math.pow(2, -10 * progress);

                // 現在の数値を計算して表示
                obj.innerText = Math.floor(start + (end - start) * easeOut);

                if (progress < 1) {
                    // まだ終わってなければ次のフレームを描画
                    obj.animationId = requestAnimationFrame(step);
                } else {
                    // 最後にキッチリ目的の点数に合わせて終了
                    obj.innerText = end;
                }
            };
            obj.animationId = requestAnimationFrame(step);
        }

        // 変動値をフワッと浮かせて消す関数
        function showFloatingDiff(idx, diff, duration) {
            const playerDiv = document.getElementById('p' + idx);
            if (!playerDiv) return;

            // <div>を新しく作る
            const diffEl = document.createElement('div');
            diffEl.className = 'score-diff';

            // プラスとマイナスでテキストと色を分ける
            diffEl.innerText = diff > 0 ? `+${diff}` : `${diff}`;
            diffEl.style.color = diff > 0 ? 'var(--win)' : 'var(--lose)';

            // プレイヤーの枠の中に追加する
            playerDiv.appendChild(diffEl);

            // アニメーションを定義して実行
            const anim = diffEl.animate([
                { transform: 'translateY(6vmin)', opacity: .5 },
                { transform: 'translateY(-2vmin)', opacity: 0 }
            ], {
                // 点数パラパラが終わった後も少し余韻を残す
                duration: Math.max(1500, duration + 500),
                easing: 'ease-out'
            });

            // アニメーションが完全に終わったら、作られた<div>をHTMLから消し去る
            anim.onfinish = () => diffEl.remove();
        }
    </script>
